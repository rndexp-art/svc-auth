{% extends "_card_base.html" %}
{% block title %}Forgot password · rndexp.art{% endblock %}
{% block content %}
<h1>Forgot your password?</h1>
<p class="muted">
  Enter your email and we'll send a one-time link to reset it. The link expires in 30 minutes.
</p>
<form action="/forgot-password" method="post">
  <label>Email
    <input name="email" type="email" autocomplete="username" required />
  </label>
  <button class="btn-primary" type="submit">Send reset link</button>
</form>
<p class="footer"><a href="/">Back to sign in</a></p>
{% endblock %}
