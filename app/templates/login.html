<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign in · rndexp.art</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: grid; place-items: center;
      background: #fafafa;
      color: #111;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0e0e10; color: #f2f2f2; }
      .card { background: #18181b; border-color: #27272a; }
      .muted { color: #a1a1aa; }
      .btn { background: #fff; color: #1f1f1f; }
      .btn:hover { background: #f1f1f1; }
    }
    .card {
      width: min(380px, calc(100vw - 32px));
      padding: 32px 28px;
      border: 1px solid #e4e4e7;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,.06);
      text-align: center;
    }
    h1 { font-size: 19px; margin: 0 0 6px; font-weight: 600; }
    .muted { color: #6b7280; font-size: 13px; margin: 0 0 24px; }
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      width: 100%;
      padding: 12px 16px;
      border-radius: 9px;
      border: 1px solid #d4d4d8;
      background: #fff; color: #1f1f1f;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      justify-content: center;
      transition: background .12s ease;
    }
    .btn:hover { background: #f8f8f8; }
    .target { font-size: 12px; margin-top: 18px; color: #6b7280; word-break: break-all; }
    .target code { background: rgba(127,127,127,.12); padding: 1px 5px; border-radius: 4px; }
    svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Sign in to rndexp.art</h1>
    <p class="muted">Use your Google account to continue.</p>
    <a class="btn" href="{{ start_url }}">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.583-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </a>
    {% if target %}
      <p class="target">After signing in you'll be sent to <code>{{ target }}</code></p>
    {% endif %}
    {% if not google_configured %}
      <p class="target" style="color:#b91c1c">Google OAuth is not configured on this server.</p>
    {% endif %}
  </main>
</body>
</html>
